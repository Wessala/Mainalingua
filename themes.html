<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Poppins', sans-serif; background: #F5F3FC; min-height: 100vh; display: flex; }
  .side-nav { position: fixed; left: 0; top: 0; height: 100vh; width: 210px; background: #341A72; display: flex; flex-direction: column; padding: 20px 12px; z-index: 100; gap: 6px; overflow-y: auto; transition: transform 0.3s ease; }
  .side-nav.hidden { transform: translateX(-210px); }
  .side-nav-logo { font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 800; color: white; margin-bottom: 4px; padding: 0 4px; }
  .side-nav-label { font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding: 0 4px; }
  .side-nav-btn { padding: 9px 12px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.9); cursor: pointer; text-align: left; transition: all 0.2s; }
  .side-nav-btn:hover { background: rgba(255,255,255,0.25); color: white; }
  .toggle-nav-btn { position: fixed; left: 220px; top: 14px; z-index: 200; background: #341A72; color: white; border: none; border-radius: 0 8px 8px 0; padding: 8px 12px; cursor: pointer; font-size: 16px; transition: left 0.3s ease; box-shadow: 2px 2px 8px rgba(61,30,140,0.3); }
  .toggle-nav-btn.collapsed { left: 0px; }
  .main-content { position: relative; margin-left: 210px; flex: 1; padding: 40px 36px; transition: margin-left 0.3s ease; overflow: hidden; }
  .main-content.full { margin-left: 0; }
  .bg-deco svg { position: absolute; opacity: 0.26; fill: none; }
  .bg-deco svg:nth-child(1) { top: 1.5%; left: 3%; width: 64px; transform: rotate(12deg);}
  .bg-deco svg:nth-child(2) { top: 2%; left: 16%; width: 48px; transform: rotate(-10deg);}

  .page-header, .section { position: relative; z-index: 1; }
  .page-header { text-align: center; margin-bottom: 40px; padding-top: 8px; }
  .page-title { font-family: 'Montserrat', sans-serif; font-size: 48px; font-weight: 900; color: #341A72; letter-spacing: -1px; }
  .page-title::after { content: ""; display: block; width: 64px; height: 5px; background: #F47B20; border-radius: 3px; margin: 10px auto 0; }
  .page-subtitle { font-size: 16px; color: #8678A8; font-weight: 400; margin-top: 14px; }
  .section { max-width: 900px; margin: 0 auto 40px; scroll-margin-top: 32px; }
  .letter { font-family: 'Montserrat', sans-serif; font-size: 24px; font-weight: 900; color: #341A72; text-align: center; margin-bottom: 16px; padding: 6px 0; border-bottom: 3px solid #F47B20; display: inline-block; min-width: 60px; }
  .letter-wrap { text-align: center; margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .card { background: white; border: 2px solid #E5DFF5; border-radius: 14px; padding: 18px 12px; text-align: center; cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 700; color: #341A72; line-height: 1.4; box-shadow: 0 2px 8px rgba(61,30,140,0.06); transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 10px 22px rgba(61,30,140,0.16); border-color: #F47B20; }
  .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
  .loading-spinner { width: 48px; height: 48px; border: 4px solid #E5DFF5; border-top-color: #341A72; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'Poppins', sans-serif; font-size: 16px; color: #8678A8; }
  @media (max-width: 768px) {
    .side-nav { transform: translateX(-210px); }
    .side-nav.visible { transform: translateX(0); }
    .toggle-nav-btn { left: 0px; }
    .toggle-nav-btn.expanded { left: 210px; }
    .main-content { margin-left: 0; padding: 18px 12px; }
    .page-title { font-size: 26px; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .card { padding: 16px 10px; font-size: 13px; }

<script>
const BASE_URL = 'https://wessala.github.io/Mainalingua/';

function toggleNav(){
  const nav=document.getElementById('sideNav'),main=document.getElementById('mainContent'),btn=document.getElementById('toggleBtn');
  if(window.innerWidth<=768){nav.classList.toggle('visible');btn.classList.toggle('expanded');}
  else{nav.classList.toggle('hidden');main.classList.toggle('full');btn.classList.toggle('collapsed');}
}

function navigate(theme) {
  document.body.innerHTML = '';
  document.body.style.margin = '0';
  document.body.style.padding = '0';
  document.body.style.overflow = 'hidden';
  const iframe = document.createElement('iframe');
  iframe.src = 'index.html?theme=' + encodeURIComponent(theme);
  iframe.style.cssText = 'width:100%;height:100vh;border:none;position:fixed;top:0;left:0;z-index:9999;';
  document.body.appendChild(iframe);
}

function getFirstLetter(theme) {
  // Enlever les underscores, prendre la première lettre sans accent
  const clean = theme.replace(/_/g, ' ').normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  return clean[0].toUpperCase();
}

function getDisplayName(theme) {
  return theme.replace(/_/g, ' ');
}

async function loadThemes() {
  try {
    const response = await fetch(BASE_URL + 'data.json');
    if (!response.ok) throw new Error('Impossible de charger data.json');
    const data = await response.json();

    // Trier les thèmes alphabétiquement (sans accents pour le tri)
    const themes = Object.keys(data).sort((a, b) => {
      const an = a.replace(/_/g, ' ').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
      const bn = b.replace(/_/g, ' ').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
      return an.localeCompare(bn);
    });

    // Grouper par première lettre
    const groups = {};
    themes.forEach(theme => {
      const letter = getFirstLetter(theme);
      if (!groups[letter]) groups[letter] = [];
      groups[letter].push(theme);
    });

    // Générer le HTML
    const content = document.getElementById('themesContent');
    content.innerHTML = '';
    const letters = Object.keys(groups).sort();

    letters.forEach(letter => {
      const section = document.createElement('div');
      section.className = 'section';
      section.id = 'section-' + letter;
      section.innerHTML = `<div class="letter-wrap"><div class="letter">${letter}</div></div><div class="grid" id="grid-${letter}"></div>`;
      content.appendChild(section);

      const grid = section.querySelector(`#grid-${letter}`);
      groups[letter].forEach(theme => {
        const card = document.createElement('div');
        card.className = 'card';
        card.textContent = getDisplayName(theme);
        card.onclick = () => navigate(theme);
        grid.appendChild(card);
      });
    });

    // Générer la nav des lettres
    const nav = document.getElementById('letterNav');
    nav.innerHTML = '';
    letters.forEach(l => {
      const btn = document.createElement('button');
      btn.textContent = l;
      btn.className = 'side-nav-btn';
      btn.onclick = () => {
        document.getElementById('section-' + l).scrollIntoView({behavior:'smooth'});
        if(window.innerWidth<=768){
          document.getElementById('sideNav').classList.remove('visible');
          document.getElementById('toggleBtn').classList.remove('expanded');
        }
      };
      nav.appendChild(btn);
    });

    document.getElementById('loadingScreen').style.display = 'none';
    content.style.display = 'block';
    reportHeight();

  } catch(e) {
    document.getElementById('loadingScreen').innerHTML = `
      <div style="text-align:center;padding:40px">
        <div style="font-family:Montserrat;font-size:20px;font-weight:800;color:#E84393;margin-bottom:12px;">Erreur de chargement</div>
        <div style="font-family:Poppins;font-size:14px;color:#8678A8;">${e.message}</div>
      </div>`;
  }
}

function setLang(lang) {
  const fr = lang === 'fr';
  document.getElementById('navLogo').textContent = fr ? 'Thèmes' : 'Themes';
  document.getElementById('navLabel').textContent = fr ? 'Lettres' : 'Letters';
  document.getElementById('title').textContent = fr ? 'Thèmes' : 'Themes';
  document.getElementById('subtitle').textContent = fr ? 'Choisissez un thème pour commencer' : 'Choose a theme to get started';
}

let langReceived = false;
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'LANG') { langReceived = true; setLang(e.data.lang); }
});
let interval = setInterval(() => { if (!langReceived) window.parent.postMessage('READY','*'); else clearInterval(interval); }, 300);

// Report height
let lastH = 0;
function reportHeight(){const h=Math.ceil(document.body.scrollHeight);if(Math.abs(h-lastH)>2){lastH=h;window.parent.postMessage({type:'RESIZE',height:h},'*');}}
if(window.ResizeObserver){new ResizeObserver(()=>reportHeight()).observe(document.body);}
window.addEventListener('load',reportHeight);window.addEventListener('resize',reportHeight);
setTimeout(reportHeight,300);setTimeout(reportHeight,1000);

loadThemes();
</script>
</body>
</html>
