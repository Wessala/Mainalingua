name: Générer data.json automatiquement

on:
  push:
    paths:
      - 'image/**'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Générer data.json
        run: |
          python3 << 'PYEOF'
          import os, json

          images_dir = "image"
          data = {}

          if os.path.exists(images_dir):
            for theme in sorted(os.listdir(images_dir)):
              theme_path = os.path.join(images_dir, theme)
              if not os.path.isdir(theme_path):
                continue
              words = []
              for filename in sorted(os.listdir(theme_path)):
                if not filename.lower().endswith('.png'):
                  continue
                if filename == '.gitkeep':
                  continue
                word = filename[:-4].replace('_', ' ')
                image_path = f"image/{theme}/{filename}"
                words.append({"word": word, "image": image_path})
              if words:
                data[theme] = words

          existing_path = "data.json"
          if os.path.exists(existing_path):
            with open(existing_path, 'r', encoding='utf-8') as f:
              existing = json.load(f)
            for theme, items in existing.items():
              if theme not in data and items:
                data[theme] = items
              elif theme in data:
                has_wix = any('wixstatic' in item.get('image','') for item in items)
                if has_wix:
                  data[theme] = items

          with open(existing_path, 'w', encoding='utf-8') as f:
            json.dump(data, f, ensure_ascii=False, indent=2)

          print(f"✅ data.json généré avec {len(data)} thèmes")
          for theme, items in data.items():
            print(f"  - {theme}: {len(items)} mots")
          PYEOF

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "🤖 Mise à jour automatique de data.json"
          git push