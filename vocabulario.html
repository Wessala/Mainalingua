<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Poppins', sans-serif; background: #F5F7FF; min-height: 100vh; padding: 40px 32px; }
  .page-header { text-align: center; margin-bottom: 48px; }
  .theme-title { font-family: 'Montserrat', sans-serif; font-size: 42px; font-weight: 900; color: #0D47A1; }
  .loading { text-align: center; color: #7B8BB2; font-size: 16px; padding: 60px; }
  .error { text-align: center; color: #FF3D00; font-size: 16px; padding: 60px; }
  .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; max-width: 960px; margin: 0 auto; }
  .vocab-card { position: relative; border-radius: 18px; overflow: hidden; background: white; box-shadow: 0 2px 12px rgba(13,71,161,0.08); cursor: pointer; transition: transform 0.22s ease, box-shadow 0.22s ease; aspect-ratio: 1; }
  .vocab-card:hover { transform: translateY(-6px); box-shadow: 0 12px 28px rgba(13,71,161,0.18); }
  .vocab-card img { width: 100%; height: 100%; object-fit: contain; display: block; padding: 14px; }
  .vocab-card:hover img { transform: scale(1.06); transition: transform 0.3s ease; }
  .vocab-label { position: absolute; bottom: 0; left: 0; right: 0; background: #0D47A1; color: white; font-family: 'Poppins', sans-serif; font-size: 16px; font-weight: 700; padding: 10px 8px; text-align: center; transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.34,1.4,0.64,1); }
  .vocab-card:hover .vocab-label { transform: translateY(0); }
  .word-count { display: inline-block; background: #0D47A1; color: white; font-size: 12px; font-weight: 600; padding: 5px 16px; border-radius: 20px; margin-top: 10px; }
</style>
</head>
<body>

<div class="page-header">
  <div class="theme-title" id="themeTitle">Chargement...</div>
  <div class="word-count" id="wordCount"></div>
</div>
<div id="content">
  <div class="loading" id="loadingMsg">Chargement des données...</div>
</div>

<script>
  // URL du fichier JSON contenant tous les thèmes (sur le même dépôt GitHub Pages)
  const DATA_URL = 'data.json';

  function getThemeFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('theme') || 'Frutas';
  }

  async function loadData() {
    const theme = getThemeFromURL();
    try {
      const response = await fetch(DATA_URL);
      if (!response.ok) throw new Error('Impossible de charger data.json');
      const allData = await response.json();

      if (!allData[theme]) {
        document.getElementById('content').innerHTML = `<div class="error">Thème "${theme}" introuvable dans data.json</div>`;
        document.getElementById('themeTitle').textContent = theme;
        return;
      }

      renderTheme(theme, allData[theme]);
    } catch (e) {
      document.getElementById('content').innerHTML = `<div class="error">Erreur de chargement : ${e.message}</div>`;
    }
  }

  function renderTheme(theme, items) {
    document.getElementById('themeTitle').textContent = theme;
    document.getElementById('wordCount').textContent = items.length + ' palabras';

    const grid = document.createElement('div');
    grid.className = 'vocab-grid';

    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'vocab-card';
      card.innerHTML = `<img src="${item.image}" alt="${item.word}" onerror="this.style.display='none'"><div class="vocab-label">${item.word}</div>`;
      grid.appendChild(card);
    });

    document.getElementById('content').innerHTML = '';
    document.getElementById('content').appendChild(grid);
  }

  loadData();
</script>
</body>
</html>
